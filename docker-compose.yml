version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: davis-weather-backend
    ports:
      - "4000:4000"
    environment:
      - STATION_URL=http://192.168.1.103/v1/current_conditions
      - STATION_TOKEN=${STATION_TOKEN:-}
      - POLL_INTERVAL=60000
      - PORT=4000
      - DB_PATH=/app/data.db
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/data
    networks:
      - weather-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: davis-weather-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:4000
    depends_on:
      - backend
    networks:
      - weather-network
    restart: unless-stopped

networks:
  weather-network:
    driver: bridge

volumes:
  weather-data:
